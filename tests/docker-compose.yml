version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: moleculerpy-redis-test
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - moleculerpy-test

volumes:
  redis-data:

networks:
  moleculerpy-test:
    driver: bridge
