version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: moleculerpy-channels-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - moleculerpy-channels

  nats:
    image: nats:2-alpine
    container_name: moleculerpy-channels-nats
    ports:
      - "4222:4222"   # Client connections
      - "6222:6222"   # Cluster connections
      - "8222:8222"   # HTTP monitoring
    command: >
      -js
      --store_dir /data
      --max_mem_store 256MB
      --max_file_store 1GB
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "4222"]
      interval: 5s
      timeout: 2s
      retries: 10
    volumes:
      - nats-data:/data
    networks:
      - moleculerpy-channels

volumes:
  redis-data:
    name: moleculerpy-channels-redis-data
  nats-data:
    name: moleculerpy-channels-nats-data

networks:
  moleculerpy-channels:
    name: moleculerpy-channels-network
    driver: bridge
