name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # nats:2-alpine starts with default config (no JetStream) — same as
      # the working ci.yml. The previous attempt to enable JetStream via
      # `--entrypoint "/nats-server -js"` broke because Docker parses
      # that quoted string as a single literal binary path
      # (`/nats-server -js`, including the space) and fails with
      # `stat /nats-server -js: no such file or directory`. This blocked
      # both the v0.2.0 and v0.2.1 publish runs until the fix.
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      NATS_URL: nats://localhost:4222
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run unit tests
        # Only the unit suite runs in the publish gate. The integration
        # suite (tests/integration/) hardcodes Redis on port 6380 to avoid
        # colliding with system Redis on 6379, and the e2e suite needs the
        # full local docker-compose.yml. Both are run in ci.yml against
        # their own service definitions; gating publish on the unit suite
        # alone keeps the release path fast and deterministic.
        run: pytest tests/unit/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m venv /tmp/moleculerpy-channels-smoke
          /tmp/moleculerpy-channels-smoke/bin/pip install dist/*.whl
          /tmp/moleculerpy-channels-smoke/bin/python -c "import moleculerpy_channels"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moleculerpy-channels-dist
          path: dist/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    # Must match the "Environment name" registered with the PyPI Trusted
    # Publisher entry. The OIDC token claims include the environment, and
    # PyPI rejects the exchange with `invalid-publisher` if the workflow's
    # `environment:` (or absence of it) does not match what is registered
    # on PyPI. Mirrors the working core moleculerpy publish.yaml.
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: moleculerpy-channels-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
